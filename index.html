<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GAINS">
<title>GAINS</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232743F0'/%3E%3Ctext x='50' y='68' font-size='50' font-weight='900' text-anchor='middle' fill='white' font-family='Helvetica'%3EG%3C/text%3E%3C/svg%3E">
<style>
  html, body { margin: 0; padding: 0; background: #F5F4EF; overscroll-behavior: none; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
// localStorage shim matching the window.storage API the app uses
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error("not found");
    return { key, value: v };
  },
  set: async (key, value) => { localStorage.setItem(key, value); return { key, value }; },
  delete: async (key) => { localStorage.removeItem(key); return { key, deleted: true }; },
  list: async (prefix) => ({ keys: Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix)) }),
};
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ================= LIFT DEFINITIONS =================
const LIFTS = {
  A: [
    { id: "squat", name: "Squat", scheme: "3 × 5", inc: 5 },
    { id: "bench", name: "Bench Press", scheme: "3 × 5", inc: 5 },
    { id: "row", name: "Barbell Row", scheme: "3 × 8", inc: 5 },
    { id: "plank", name: "Plank", scheme: "3 × 30 sec", inc: 0 },
  ],
  B: [
    { id: "deadlift", name: "Deadlift", scheme: "3 × 5", inc: 5 },
    { id: "ohp", name: "Overhead Press", scheme: "3 × 5", inc: 2.5 },
    { id: "pullup", name: "Pull-ups / Lat Pulldown", scheme: "3 × near-failure", inc: 0 },
    { id: "curl", name: "Dumbbell Curls", scheme: "3 × 10", inc: 0 },
  ],
};
const DEFAULT_WEIGHTS = { squat: 45, bench: 45, row: 65, deadlift: 95, ohp: 45, pullup: 0, curl: 15 };

const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
};
const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const fmt = (mins) => {
  let h = Math.floor(mins / 60);
  const m = mins % 60;
  const ap = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, "0")}${ap}`;
};

const buildEvents = (isLiftDay, isSunday, letter, offsetMin, liftWeights) => {
  const evts = [];
  if (isSunday) {
    evts.push({
      id: "weighin",
      time: 10 * 60 + 55,
      title: "Weigh In",
      sub: "Before the shake, after the bathroom — same conditions every week",
      steps: ["Step on the scale", "Log the number in the Progress tab"],
    });
  }
  evts.push({
    id: "shake1",
    time: 11 * 60,
    title: "Make Shake #1",
    sub: "Creatine goes in THIS one",
    steps: [
      "Pour 2 cups whole milk into blender",
      "Add 3/4 cup rolled oats",
      "Add 2 tbsp peanut butter",
      "Add 1 banana (frozen = better)",
      "Add 1 scoop whey protein",
      "Add 1 tbsp honey",
      "Add 1 tsp (5g) creatine",
      "Blend 60 seconds. Drink it all.",
    ],
  });
  evts.push({
    id: "snack1",
    time: 13 * 60,
    title: "Grab-and-go Snack",
    sub: "Pocket food — you're in class/moving",
    steps: [
      "Option 1: 1 Clif bar + 1 sandwich bag of trail mix (~1/2 cup)",
      "Option 2: 2 tbsp peanut butter on 6 crackers (bag it in the morning)",
      "Option 3: 1 big handful Planters peanuts (~1/3 cup) + 1 granola bar",
      "If you can grab a drink: whole milk > anything else",
    ],
  });
  if (isLiftDay) {
    evts.push({
      id: "prelift",
      time: 18 * 60 - offsetMin,
      title: `Head to Gym (${offsetMin} min heads-up)`,
      sub: "Fuel up if you feel low",
      steps: ["Eat 1 banana OR 1 granola bar if energy is low", "Fill water bottle", "Get to the gym"],
    });
    evts.push({
      id: "lift",
      time: 18 * 60,
      title: `Workout ${letter}`,
      sub: "Exact weights below · rest 2-3 min between sets",
      steps: LIFTS[letter].map((l) => {
        const w = liftWeights[l.id];
        if (l.id === "pullup") return `${l.name} — ${l.scheme}`;
        if (l.id === "plank") return `${l.name} — ${l.scheme}`;
        return `${l.name} — ${l.scheme} @ ${w} lbs`;
      }),
    });
  }
  evts.push({
    id: "shake2",
    time: 19 * 60,
    title: "Make Shake #2 + Eat Dinner",
    sub: isLiftDay ? "Post-workout — most important shake of the day" : "Dinner shake",
    steps: [
      "Same shake: 2 cups whole milk, 3/4 cup oats, 2 tbsp PB, 1 banana, 1 scoop whey, 1 tbsp honey",
      "NO creatine in this one (already had it at 11am)",
      "Blend 60 seconds",
      "Eat your normal dinner too",
      "Add ONE upgrade to dinner: extra rice, 1 tbsp olive oil, or cheese",
    ],
  });
  evts.push({
    id: "snack2",
    time: 20 * 60 + 30,
    title: "Bedtime Snack",
    sub: "Eating before bed = free gains",
    steps: [
      "1 big handful trail mix or peanuts (~1/3 cup)",
      "OR 1 spoon peanut butter straight from the jar",
      "PLUS 1 full glass whole milk",
    ],
  });
  return evts.sort((a, b) => a.time - b.time);
};

function GainCoach() {
  const [tab, setTab] = useState("home");
  const [nowMin, setNowMin] = useState(() => {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  });
  const [state, setState] = useState({
    checks: {},
    checksDate: todayKey(),
    nextWorkout: "A",
    startWeight: null,
    weights: [],
    offsetMin: 10,
    notifOn: false,
    liftWeights: { ...DEFAULT_WEIGHTS },
    streak: 0,
    lastFullDay: null,
  });
  const [loaded, setLoaded] = useState(false);
  const [weightInput, setWeightInput] = useState("");
  const [startInput, setStartInput] = useState("");
  const [range, setRange] = useState("ALL");
  const notified = useRef({});

  const day = new Date().getDay();
  const isLiftDay = [1, 3, 5].includes(day);
  const isSunday = day === 0;

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("gain-coach-v3");
        if (r && r.value) {
          const s = JSON.parse(r.value);
          if (s.checksDate !== todayKey()) {
            s.checks = {};
            s.checksDate = todayKey();
          }
          setState((p) => ({ ...p, ...s, liftWeights: { ...DEFAULT_WEIGHTS, ...(s.liftWeights || {}) } }));
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  const save = async (next) => {
    setState(next);
    try {
      await window.storage.set("gain-coach-v3", JSON.stringify(next));
    } catch (e) {
      console.error(e);
    }
  };

  useEffect(() => {
    const t = setInterval(() => {
      const d = new Date();
      setNowMin(d.getHours() * 60 + d.getMinutes());
    }, 20000);
    return () => clearInterval(t);
  }, []);

  const events = buildEvents(isLiftDay, isSunday, state.nextWorkout, state.offsetMin, state.liftWeights);

  useEffect(() => {
    if (!state.notifOn || typeof Notification === "undefined") return;
    events.forEach((e) => {
      if (nowMin >= e.time && !state.checks[e.id] && !notified.current[e.id + todayKey()]) {
        notified.current[e.id + todayKey()] = true;
        if (Notification.permission === "granted") {
          try {
            new Notification("⏰ " + e.title, { body: e.steps[0] });
          } catch (err) {}
        }
      }
    });
  }, [nowMin, state.notifOn, state.checks]);

  const toggleCheck = (id) => {
    const checks = { ...state.checks, [id]: !state.checks[id] };
    const next = { ...state, checks, checksDate: todayKey() };
    // workout done: flip A/B and auto-progress weights
    if (id === "lift" && !state.checks[id]) {
      const lw = { ...state.liftWeights };
      LIFTS[state.nextWorkout].forEach((l) => {
        if (l.inc > 0) lw[l.id] = (lw[l.id] || 0) + l.inc;
      });
      next.liftWeights = lw;
      next.nextWorkout = state.nextWorkout === "A" ? "B" : "A";
    }
    // streak: all events done today
    const allDone = events.every((e) => checks[e.id]);
    if (allDone && state.lastFullDay !== todayKey()) {
      next.streak = (state.streak || 0) + 1;
      next.lastFullDay = todayKey();
    }
    save(next);
  };

  const logWeight = () => {
    const lbs = parseFloat(weightInput);
    if (!lbs || lbs <= 0) return;
    const next = { ...state, weights: [...state.weights, { t: Date.now(), lbs }] };
    if (next.startWeight == null) next.startWeight = lbs;
    save(next);
    setWeightInput("");
  };

  const setStart = () => {
    const lbs = parseFloat(startInput);
    if (!lbs || lbs <= 0) return;
    save({ ...state, startWeight: lbs });
    setStartInput("");
  };

  const setLift = (id, val) => {
    const v = parseFloat(val);
    if (isNaN(v)) return;
    save({ ...state, liftWeights: { ...state.liftWeights, [id]: v } });
  };

  const askNotifPermission = async () => {
    if (typeof Notification === "undefined") {
      alert("Notifications not supported here — the timeline still updates live.");
      return;
    }
    const p = await Notification.requestPermission();
    save({ ...state, notifOn: p === "granted" });
  };

  const status = (e) => {
    if (state.checks[e.id]) return "done";
    if (nowMin >= e.time) {
      const firstLive = events.find((x) => nowMin >= x.time && !state.checks[x.id]);
      return firstLive && firstLive.id === e.id ? "active" : "overdue";
    }
    return "future";
  };
  const nextUp = events.find((e) => nowMin < e.time);
  const liveCount = events.filter((e) => state.checks[e.id]).length;

  // ---- auto-coach: flat over last 14 days? ----
  const twoWeeksAgo = Date.now() - 14 * 864e5;
  const recent = state.weights.filter((p) => p.t >= twoWeeksAgo);
  const coachFlat =
    state.weights.length >= 3 &&
    recent.length >= 2 &&
    recent[recent.length - 1].lbs - recent[0].lbs < 1;

  const rangeMs = { "1W": 7 * 864e5, "1M": 30 * 864e5, "3M": 90 * 864e5, ALL: Infinity }[range];
  const cutoff = Date.now() - rangeMs;
  const pts = state.weights.filter((p) => p.t >= cutoff);
  const latest = state.weights.length ? state.weights[state.weights.length - 1].lbs : null;
  const delta = latest != null && state.startWeight != null ? (latest - state.startWeight).toFixed(1) : null;
  const daysIn = state.weights.length ? Math.max(1, Math.round((Date.now() - state.weights[0].t) / 864e5)) : 0;

  const Chart = () => {
    if (pts.length < 2)
      return <p style={{ fontSize: 13, color: "#777", margin: 0 }}>Log at least 2 weigh-ins to see the graph.</p>;
    const vals = pts.map((p) => p.lbs);
    const min = Math.min(...vals, state.startWeight ?? Infinity) - 2;
    const max = Math.max(...vals) + 2;
    const t0 = pts[0].t,
      t1 = pts[pts.length - 1].t || t0 + 1;
    const W = 340, H = 150, P = 14;
    const X = (t) => P + ((t - t0) / (t1 - t0 || 1)) * (W - 2 * P);
    const Y = (v) => H - P - ((v - min) / (max - min)) * (H - 2 * P);
    const line = pts.map((p) => `${X(p.t)},${Y(p.lbs)}`).join(" ");
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block" }}>
        {state.startWeight != null && (
          <line x1={P} x2={W - P} y1={Y(state.startWeight)} y2={Y(state.startWeight)} stroke="#BBB" strokeDasharray="5 4" strokeWidth="1.5" />
        )}
        <polyline points={line} fill="none" stroke="#2743F0" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
        {pts.map((p, i) => (
          <circle key={i} cx={X(p.t)} cy={Y(p.lbs)} r="4.5" fill="#0E0E10" />
        ))}
      </svg>
    );
  };

  const C = { ink: "#0E0E10", paper: "#F5F4EF", blue: "#2743F0", gray: "#6E6E72", line: "#E4E2DA", warn: "#C6470E" };
  const S = {
    app: { fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif", background: C.paper, color: C.ink, height: "100vh", overflowY: "auto", WebkitOverflowScrolling: "touch", maxWidth: 480, margin: "0 auto", paddingBottom: 110, boxSizing: "border-box" },
    h1: { fontSize: 34, fontWeight: 900, letterSpacing: "-0.03em", textTransform: "uppercase", margin: "0 0 2px" },
    header: { padding: "22px 18px 6px" },
    tabbar: { position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto", display: "flex", background: C.ink, borderRadius: "16px 16px 0 0", zIndex: 10 },
    tabBtn: (a) => ({ flex: 1, padding: "15px 0", background: "none", border: "none", color: a ? C.paper : "#6E6E72", fontWeight: 800, fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer", borderTop: a ? `3px solid ${C.blue}` : "3px solid transparent" }),
    btn: { padding: "12px 18px", background: C.blue, color: "#fff", border: `2px solid ${C.ink}`, borderRadius: 10, fontWeight: 800, fontSize: 15, cursor: "pointer" },
    input: { flex: 1, padding: "12px 14px", fontSize: 16, border: `2px solid ${C.ink}`, borderRadius: 10, background: "#fff", minWidth: 0 },
    card: { background: "#fff", border: `2px solid ${C.ink}`, borderRadius: 14, margin: "12px 14px", padding: 16, boxShadow: `4px 4px 0 ${C.ink}` },
    label: { fontSize: 11, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: C.blue, margin: "0 0 8px" },
  };

  const EventCard = ({ e }) => {
    const st = status(e);
    if (st === "future") return null;
    const done = st === "done";
    const active = st === "active";
    const base = { margin: "10px 14px", borderRadius: 14, border: `2px solid ${C.ink}`, background: "#fff", transition: "all 0.4s ease", overflow: "hidden" };
    if (done)
      return (
        <div style={{ ...base, opacity: 0.35, transform: "scale(0.94)", padding: "10px 14px", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontWeight: 900, color: C.blue }}>✓</span>
          <span style={{ fontSize: 14, fontWeight: 700, textDecoration: "line-through" }}>{fmt(e.time)} — {e.title}</span>
        </div>
      );
    return (
      <div style={{ ...base, padding: 16, boxShadow: active ? `5px 5px 0 ${C.blue}` : `4px 4px 0 ${C.ink}`, opacity: active ? 1 : 0.75 }}>
        <span style={{ fontFamily: "'Courier New', monospace", fontWeight: 700, fontSize: 13, color: active ? C.blue : C.gray }}>
          {fmt(e.time)} {st === "overdue" ? "· catch up" : "· NOW"}
        </span>
        <h2 style={{ fontSize: 22, fontWeight: 900, margin: "4px 0 2px", letterSpacing: "-0.02em" }}>{e.title}</h2>
        <p style={{ fontSize: 13, color: C.gray, margin: "0 0 10px", fontWeight: 600 }}>{e.sub}</p>
        <ol style={{ margin: 0, paddingLeft: 20 }}>
          {e.steps.map((s, i) => (
            <li key={i} style={{ fontSize: 15, lineHeight: 1.5, marginBottom: 4 }}>{s}</li>
          ))}
        </ol>
        <button style={{ ...S.btn, width: "100%", marginTop: 14 }} onClick={() => toggleCheck(e.id)}>Done ✓</button>
      </div>
    );
  };

  if (!loaded) return <div style={{ ...S.app, padding: 40, textAlign: "center", fontWeight: 700 }}>Loading…</div>;

  return (
    <div style={S.app}>
      {tab === "home" && (
        <>
          <div style={S.header}>
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.14em", color: C.gray, textTransform: "uppercase" }}>
              {DAYS[day]} · {fmt(nowMin)} · {liveCount}/{events.length} done{state.streak > 0 ? ` · 🔥 ${state.streak} day streak` : ""}
            </div>
            <h1 style={S.h1}>{isLiftDay ? `Lift Day ${state.nextWorkout}` : "Rest & Eat"}</h1>
          </div>

          {coachFlat && (
            <div style={{ margin: "10px 14px", padding: "12px 16px", borderRadius: 12, border: `2px solid ${C.warn}`, background: "#FDF1EA", fontSize: 14, fontWeight: 700, color: C.warn }}>
              Coach: scale's been flat 2 weeks. Starting today — add 1 tbsp olive oil + a 2nd banana to each shake, and don't skip the bedtime snack.
            </div>
          )}

          {events.map((e) => (
            <EventCard key={e.id} e={e} />
          ))}

          {nextUp && (
            <div style={{ margin: "10px 14px", padding: "12px 16px", borderRadius: 12, border: `2px dashed ${C.gray}`, color: C.gray, fontSize: 14, fontWeight: 700 }}>
              Up next · {fmt(nextUp.time)} — {nextUp.title} (in {Math.floor((nextUp.time - nowMin) / 60)}h {(nextUp.time - nowMin) % 60}m)
            </div>
          )}
          {!nextUp && liveCount === events.length && (
            <div style={{ ...S.card, textAlign: "center", fontWeight: 900, fontSize: 18 }}>Day complete. 💪 Growth happens tonight.</div>
          )}
        </>
      )}

      {tab === "progress" && (
        <>
          <div style={S.header}><h1 style={S.h1}>Progress</h1></div>

          <div style={S.card}>
            {state.startWeight == null ? (
              <>
                <p style={S.label}>Set your starting weight</p>
                <div style={{ display: "flex", gap: 10 }}>
                  <input style={S.input} type="number" inputMode="decimal" placeholder="lbs" value={startInput} onChange={(ev) => setStartInput(ev.target.value)} />
                  <button style={S.btn} onClick={setStart}>Set</button>
                </div>
              </>
            ) : (
              <div style={{ display: "flex", justifyContent: "space-between", textAlign: "center" }}>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Start</div><div style={{ fontSize: 24, fontWeight: 900 }}>{state.startWeight}</div></div>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Now</div><div style={{ fontSize: 24, fontWeight: 900 }}>{latest ?? "—"}</div></div>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Gained</div><div style={{ fontSize: 24, fontWeight: 900, color: C.blue }}>{delta != null ? (delta > 0 ? "+" : "") + delta : "—"}</div></div>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Days</div><div style={{ fontSize: 24, fontWeight: 900 }}>{daysIn}</div></div>
              </div>
            )}
          </div>

          <div style={S.card}>
            <p style={S.label}>Log today's weight</p>
            <div style={{ display: "flex", gap: 10 }}>
              <input style={S.input} type="number" inputMode="decimal" placeholder="lbs" value={weightInput} onChange={(ev) => setWeightInput(ev.target.value)} />
              <button style={S.btn} onClick={logWeight}>Log</button>
            </div>
          </div>

          <div style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <p style={{ ...S.label, margin: 0 }}>Growth chart</p>
              <div style={{ display: "flex", gap: 4 }}>
                {["1W", "1M", "3M", "ALL"].map((r) => (
                  <button key={r} onClick={() => setRange(r)} style={{ padding: "5px 9px", fontSize: 11, fontWeight: 800, borderRadius: 8, border: `2px solid ${C.ink}`, background: range === r ? C.blue : "#fff", color: range === r ? "#fff" : C.ink, cursor: "pointer" }}>{r}</button>
                ))}
              </div>
            </div>
            <Chart />
            <p style={{ fontSize: 12, color: C.gray, margin: "8px 0 0" }}>Dashed line = start. Target: +0.5–1 lb/week.</p>
          </div>

          <div style={S.card}>
            <p style={S.label}>Current lift numbers (auto +5 lbs each workout)</p>
            {Object.entries({ ...LIFTS.A.reduce((a, l) => ({ ...a, [l.id]: l }), {}), ...LIFTS.B.reduce((a, l) => ({ ...a, [l.id]: l }), {}) })
              .filter(([id]) => !["plank", "pullup"].includes(id))
              .map(([id, l]) => (
                <div key={id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.line}` }}>
                  <span style={{ fontWeight: 600, fontSize: 15 }}>{l.name}</span>
                  <input
                    type="number"
                    value={state.liftWeights[id]}
                    onChange={(ev) => setLift(id, ev.target.value)}
                    style={{ width: 70, padding: "6px 8px", fontSize: 15, fontWeight: 700, border: `2px solid ${C.ink}`, borderRadius: 8, textAlign: "right" }}
                  />
                </div>
              ))}
            <p style={{ fontSize: 12, color: C.gray, margin: "8px 0 0" }}>First time? These defaults are beginner bar weights — adjust to what you can actually lift for 5 clean reps.</p>
          </div>
        </>
      )}

      {tab === "settings" && (
        <>
          <div style={S.header}><h1 style={S.h1}>Settings</h1></div>

          <div style={S.card}>
            <p style={S.label}>Gym heads-up time</p>
            <p style={{ fontSize: 14, margin: "0 0 8px" }}>
              Alert me <b>{state.offsetMin < 60 ? `${state.offsetMin} min` : `${(state.offsetMin / 60).toFixed(1)} hr`}</b> before my 6pm workout
            </p>
            <input type="range" min="0" max="300" step="5" value={state.offsetMin} onChange={(ev) => save({ ...state, offsetMin: parseInt(ev.target.value) })} style={{ width: "100%" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.gray, fontWeight: 700 }}><span>0 min</span><span>5 hrs</span></div>
          </div>

          <div style={S.card}>
            <p style={S.label}>Notifications</p>
            <p style={{ fontSize: 13, color: C.gray, margin: "0 0 10px" }}>
              Alerts fire while this app is open. For when it's closed: set recurring iPhone alarms at 11am, 1pm, 5:50pm, 7pm, 8:30pm once and you're covered forever.
            </p>
            <button style={S.btn} onClick={askNotifPermission}>{state.notifOn ? "Notifications ON ✓" : "Turn on notifications"}</button>
          </div>

          <div style={S.card}>
            <p style={S.label}>Starting weight</p>
            <div style={{ display: "flex", gap: 10 }}>
              <input style={S.input} type="number" inputMode="decimal" placeholder={state.startWeight ? `${state.startWeight} lbs` : "lbs"} value={startInput} onChange={(ev) => setStartInput(ev.target.value)} />
              <button style={S.btn} onClick={setStart}>Save</button>
            </div>
          </div>

          <div style={S.card}>
            <p style={S.label}>Next workout</p>
            <p style={{ fontSize: 14, margin: "0 0 10px" }}>Set to Workout <b>{state.nextWorkout}</b>. Auto-flips when you check off a workout.</p>
            <button style={{ ...S.btn, background: "#fff", color: C.ink }} onClick={() => save({ ...state, nextWorkout: state.nextWorkout === "A" ? "B" : "A" })}>
              Switch to {state.nextWorkout === "A" ? "B" : "A"}
            </button>
          </div>
        </>
      )}

      <nav style={S.tabbar}>
        <button style={S.tabBtn(tab === "home")} onClick={() => setTab("home")}>Today</button>
        <button style={S.tabBtn(tab === "progress")} onClick={() => setTab("progress")}>Progress</button>
        <button style={S.tabBtn(tab === "settings")} onClick={() => setTab("settings")}>Settings</button>
      </nav>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<GainCoach />);
</script>
</body>
</html>
