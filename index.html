<script>
// localStorage shim matching the window.storage API the app uses
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error("not found");
    return { key, value: v };
  },
  set: async (key, value) => { localStorage.setItem(key, value); return { key, value }; },
  delete: async (key) => { localStorage.removeItem(key); return { key, deleted: true }; },
  list: async (prefix) => ({ keys: Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix)) }),
};
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ================= LIFT DEFINITIONS =================
const LIFTS = {
  A: [
    { id: "squat", name: "Squat", scheme: "3 × 5", inc: 5 },
    { id: "bench", name: "Bench Press", scheme: "3 × 5", inc: 5 },
    { id: "row", name: "Barbell Row", scheme: "3 × 8", inc: 5 },
    { id: "plank", name: "Plank", scheme: "3 × 30 sec", inc: 0 },
  ],
  B: [
    { id: "deadlift", name: "Deadlift", scheme: "3 × 5", inc: 5 },
    { id: "ohp", name: "Overhead Press", scheme: "3 × 5", inc: 2.5 },
    { id: "pullup", name: "Pull-ups / Lat Pulldown", scheme: "3 × near-failure", inc: 0 },
    { id: "curl", name: "Dumbbell Curls", scheme: "3 × 10", inc: 0 },
  ],
};
const DEFAULT_WEIGHTS = { squat: 45, bench: 45, row: 65, deadlift: 95, ohp: 45, pullup: 0, curl: 15 };

const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
};
const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const CALS = { shake1: 1100, snack1: 400, prelift: 100, lift: 0, shake2: 1600, snack2: 450, weighin: 0 };
const TOASTS = {
  shake1: "+1,100 cal banked 🥤",
  snack1: "+400 cal banked 🥜",
  prelift: "Fueled up ⛽",
  lift: "Workout done — bar goes up 5 lbs next time 🏋️",
  shake2: "+1,600 cal banked 🍽️",
  snack2: "+450 cal banked 🌙",
  weighin: "Logged. Data = gains 📈",
};

const PANTRY = [
  { id: "milk", name: "Whole milk", unit: "cups", pkg: 16, pkgLabel: "1 gallon", brand: "Any brand · 1 gallon jug", price: 4, perDay: 5, buy: "https://www.amazon.com/s?k=whole+milk+gallon" },
  { id: "oats", name: "Rolled oats", unit: "cups", pkg: 15, pkgLabel: "42oz canister", brand: "Quaker Old Fashioned · 42oz", price: 6, perDay: 1.5, buy: "https://www.amazon.com/s?k=quaker+old+fashioned+oats+42oz" },
  { id: "pb", name: "Peanut butter", unit: "tbsp", pkg: 72, pkgLabel: "40oz jar", brand: "Jif or Skippy · 40oz jar", price: 8, perDay: 4, buy: "https://www.amazon.com/s?k=jif+creamy+peanut+butter+40oz" },
  { id: "bananas", name: "Bananas", unit: "", pkg: 7, pkgLabel: "1 bunch", brand: "1–2 bunches, slightly green", price: 2, perDay: 2, buy: "https://www.amazon.com/s?k=fresh+bananas" },
  { id: "whey", name: "Whey protein", unit: "scoops", pkg: 29, pkgLabel: "2lb tub", brand: "ON Gold Standard · 2lb (or Nutricost)", price: 40, perDay: 2, buy: "https://www.amazon.com/s?k=optimum+nutrition+gold+standard+whey+2lb" },
  { id: "honey", name: "Honey", unit: "tbsp", pkg: 24, pkgLabel: "12oz bottle", brand: "Any brand · 12oz squeeze bottle", price: 5, perDay: 2, buy: "https://www.amazon.com/s?k=honey+12oz+bottle" },
  { id: "creatine", name: "Creatine", unit: "tsp", pkg: 200, pkgLabel: "1kg bag", brand: "BulkSupplements monohydrate · 1kg", price: 25, perDay: 1, buy: "https://www.amazon.com/dp/B00E9M4XEE" },
  { id: "snacks", name: "Trail mix / bars", unit: "servings", pkg: 14, pkgLabel: "big bag + box", brand: "Planters/Kirkland mix 2lb + Clif box", price: 15, perDay: 2, buy: "https://www.amazon.com/s?k=planters+trail+mix+2lb" },
];
const FULL_PANTRY = Object.fromEntries(PANTRY.map((i) => [i.id, i.pkg]));
const CONSUME = {
  shake1: { milk: 2, oats: 0.75, pb: 2, bananas: 1, whey: 1, honey: 1, creatine: 1 },
  shake2: { milk: 2, oats: 0.75, pb: 2, bananas: 1, whey: 1, honey: 1 },
  snack1: { snacks: 1 },
  snack2: { snacks: 1, milk: 1 },
  prelift: { bananas: 1 },
};
const MAPS_URL = "https://maps.apple.com/?q=grocery+store";
const VIDEOS = {
  squat: { id: "vmNPOjaGrVE" },
  bench: { id: "gRVjAtPip0Y" },
  deadlift: { id: "wYREQkVtvEc" },
  ohp: { id: "eNFXEEdfQp4" },
  row: { id: "G8l_8chR5BE" },
  pullup: { id: "jFmCrA6fo78" },
  curl: { q: "dumbbell curl proper form" },
  plank: { q: "plank proper form" },
};
const videoSrc = (id) => {
  const v = VIDEOS[id];
  return v && v.id ? `https://www.youtube.com/embed/${v.id}` : null;
};
const videoLink = (id) => {
  const v = VIDEOS[id];
  return v && v.q ? `https://www.youtube.com/results?search_query=${encodeURIComponent(v.q)}` : null;
};
const fmt = (mins) => {
  let h = Math.floor(mins / 60);
  const m = mins % 60;
  const ap = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, "0")}${ap}`;
};

const buildEvents = (isLiftDay, isSunday, letter, offsetMin, liftWeights) => {
  const evts = [];
  if (isSunday) {
    evts.push({
      id: "weighin",
      time: 10 * 60 + 55,
      title: "Weigh In",
      sub: "Before the shake, after the bathroom — same conditions every week",
      steps: ["Step on the scale", "Log the number in the Progress tab"],
    });
  }
  evts.push({
    id: "shake1",
    time: 11 * 60,
    title: "Make Shake #1",
    sub: "Creatine goes in THIS one",
    steps: [
      "Pour 2 cups whole milk into blender",
      "Add 3/4 cup rolled oats",
      "Add 2 tbsp peanut butter",
      "Add 1 banana (frozen = better)",
      "Add 1 scoop whey protein",
      "Add 1 tbsp honey",
      "Add 1 tsp (5g) creatine",
      "Blend 60 seconds. Drink it all.",
    ],
  });
  evts.push({
    id: "snack1",
    time: 13 * 60,
    title: "Grab-and-go Snack",
    sub: "Pocket food — you're in class/moving",
    steps: [
      "Option 1: 1 Clif bar + 1 sandwich bag of trail mix (~1/2 cup)",
      "Option 2: 2 tbsp peanut butter on 6 crackers (bag it in the morning)",
      "Option 3: 1 big handful Planters peanuts (~1/3 cup) + 1 granola bar",
      "If you can grab a drink: whole milk > anything else",
    ],
  });
  if (isLiftDay) {
    evts.push({
      id: "prelift",
      time: 18 * 60 - offsetMin,
      title: `Head to Gym (${offsetMin} min heads-up)`,
      sub: "Fuel up if you feel low",
      steps: ["Eat 1 banana OR 1 granola bar if energy is low", "Fill water bottle", "Get to the gym"],
    });
    evts.push({
      id: "lift",
      time: 18 * 60,
      title: `Workout ${letter}`,
      sub: "Exact weights below · rest 2-3 min between sets",
      steps: LIFTS[letter].map((l) => {
        const w = liftWeights[l.id];
        if (l.id === "pullup") return `${l.name} — ${l.scheme}`;
        if (l.id === "plank") return `${l.name} — ${l.scheme}`;
        return `${l.name} — ${l.scheme} @ ${w} lbs`;
      }),
    });
  }
  evts.push({
    id: "shake2",
    time: 19 * 60,
    title: "Make Shake #2 + Eat Dinner",
    sub: isLiftDay ? "Post-workout — most important shake of the day" : "Dinner shake",
    steps: [
      "Same shake: 2 cups whole milk, 3/4 cup oats, 2 tbsp PB, 1 banana, 1 scoop whey, 1 tbsp honey",
      "NO creatine in this one (already had it at 11am)",
      "Blend 60 seconds",
      "Eat your normal dinner too",
      "Add ONE upgrade to dinner: extra rice, 1 tbsp olive oil, or cheese",
    ],
  });
  evts.push({
    id: "snack2",
    time: 20 * 60 + 30,
    title: "Bedtime Snack",
    sub: "Eating before bed = free gains",
    steps: [
      "1 big handful trail mix or peanuts (~1/3 cup)",
      "OR 1 spoon peanut butter straight from the jar",
      "PLUS 1 full glass whole milk",
    ],
  });
  return evts.sort((a, b) => a.time - b.time);
};

const IS_STANDALONE = (window.navigator.standalone === true) || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
const TOP_PAD = IS_STANDALONE ? "max(env(safe-area-inset-top), 62px)" : "env(safe-area-inset-top)";

function GainCoach() {
  const [tab, setTab] = useState("home");
  const [nowMin, setNowMin] = useState(() => {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  });
  const [state, setState] = useState({
    checks: {},
    checksDate: todayKey(),
    nextWorkout: "A",
    startWeight: null,
    weights: [],
    offsetMin: 10,
    notifOn: false,
    liftWeights: { ...DEFAULT_WEIGHTS },
    streak: 0,
    lastFullDay: null,
    startDate: null,
    totals: { cal: 0, shakes: 0, workouts: 0 },
    pantry: { ...FULL_PANTRY },
  });
  const [toast, setToast] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [weightInput, setWeightInput] = useState("");
  const [startInput, setStartInput] = useState("");
  const [range, setRange] = useState("ALL");
  const [liftTab, setLiftTab] = useState("A");
  const [openLift, setOpenLift] = useState(null);
  const notified = useRef({});

  const day = new Date().getDay();
  const isLiftDay = [1, 3, 5].includes(day);
  const isSunday = day === 0;

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("gain-coach-v3");
        if (r && r.value) {
          const s = JSON.parse(r.value);
          if (s.checksDate !== todayKey()) {
            s.checks = {};
            s.checksDate = todayKey();
          }
          setState((p) => ({ ...p, ...s, liftWeights: { ...DEFAULT_WEIGHTS, ...(s.liftWeights || {}) }, pantry: { ...FULL_PANTRY, ...(s.pantry || {}) } }));
        }
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  const save = async (next) => {
    setState(next);
    try {
      await window.storage.set("gain-coach-v3", JSON.stringify(next));
    } catch (e) {
      console.error(e);
    }
  };

  useEffect(() => {
    const t = setInterval(() => {
      const d = new Date();
      setNowMin(d.getHours() * 60 + d.getMinutes());
    }, 20000);
    return () => clearInterval(t);
  }, []);

  const events = buildEvents(isLiftDay, isSunday, state.nextWorkout, state.offsetMin, state.liftWeights);

  useEffect(() => {
    if (!state.notifOn || typeof Notification === "undefined") return;
    events.forEach((e) => {
      if (nowMin >= e.time && !state.checks[e.id] && !notified.current[e.id + todayKey()]) {
        notified.current[e.id + todayKey()] = true;
        if (Notification.permission === "granted") {
          try {
            new Notification("⏰ " + e.title, { body: e.steps[0] });
          } catch (err) {}
        }
      }
    });
  }, [nowMin, state.notifOn, state.checks]);

  const toggleCheck = (id) => {
    const was = state.checks[id] === true;
    const checks = { ...state.checks, [id]: !state.checks[id] };
    const next = { ...state, checks, checksDate: todayKey() };
    const t = { ...(state.totals || { cal: 0, shakes: 0, workouts: 0 }) };
    if (!was) {
      t.cal += CALS[id] || 0;
      if (id === "shake1" || id === "shake2") t.shakes += 1;
      if (id === "lift") t.workouts += 1;
      setToast(TOASTS[id] || "Done ✓");
      setTimeout(() => setToast(null), 2500);
    } else {
      t.cal -= CALS[id] || 0;
      if (id === "shake1" || id === "shake2") t.shakes = Math.max(0, t.shakes - 1);
      if (id === "lift") t.workouts = Math.max(0, t.workouts - 1);
    }
    next.totals = t;
    const pan = { ...(state.pantry || FULL_PANTRY) };
    const use = CONSUME[id] || {};
    Object.entries(use).forEach(([k, v]) => {
      pan[k] = Math.max(0, (pan[k] ?? FULL_PANTRY[k]) + (was ? v : -v));
    });
    next.pantry = pan;
    if (id === "lift" && !state.checks[id]) {
      next.nextWorkout = state.nextWorkout === "A" ? "B" : "A";
    }
    // streak: all events done today
    const allDone = events.every((e) => checks[e.id] === true);
    if (allDone && state.lastFullDay !== todayKey()) {
      next.streak = (state.streak || 0) + 1;
      next.lastFullDay = todayKey();
    }
    save(next);
  };

  const completeLift = (success) => {
    const checks = { ...state.checks, lift: true };
    const next = { ...state, checks, checksDate: todayKey() };
    const t = { ...(state.totals || { cal: 0, shakes: 0, workouts: 0 }) };
    t.workouts += 1;
    next.totals = t;
    const pan = { ...(state.pantry || FULL_PANTRY) };
    const use = CONSUME[id] || {};
    Object.entries(use).forEach(([k, v]) => {
      pan[k] = Math.max(0, (pan[k] ?? FULL_PANTRY[k]) + (was ? v : -v));
    });
    next.pantry = pan;
    next.nextWorkout = state.nextWorkout === "A" ? "B" : "A";
    if (success) {
      const lw = { ...state.liftWeights };
      LIFTS[state.nextWorkout].forEach((l) => {
        if (l.inc > 0) lw[l.id] = (lw[l.id] || 0) + l.inc;
      });
      next.liftWeights = lw;
      setToast("All reps hit — bar goes up next time 🏋️");
    } else {
      setToast("Logged. Same weight next time — you'll get it 💪");
    }
    setTimeout(() => setToast(null), 2500);
    const allDone = events.every((e) => (e.id === "lift" ? true : checks[e.id] === true));
    if (allDone && state.lastFullDay !== todayKey()) {
      next.streak = (state.streak || 0) + 1;
      next.lastFullDay = todayKey();
    }
    save(next);
  };

  const skipEvent = (id) => {
    const checks = { ...state.checks, [id]: "skip" };
    save({ ...state, checks, checksDate: todayKey() });
  };

  const restock = (id) => {
    const item = PANTRY.find((i) => i.id === id);
    const pan = { ...(state.pantry || FULL_PANTRY) };
    pan[id] = (pan[id] || 0) + item.pkg;
    save({ ...state, pantry: pan });
    setToast(`${item.name} restocked 🛒`);
    setTimeout(() => setToast(null), 2000);
  };

  const lowItems = PANTRY.filter((i) => ((state.pantry?.[i.id] ?? i.pkg) / i.perDay) <= 3);

  const logWeight = () => {
    const lbs = parseFloat(weightInput);
    if (!lbs || lbs <= 0) return;
    const next = { ...state, weights: [...state.weights, { t: Date.now(), lbs }] };
    if (next.startWeight == null) next.startWeight = lbs;
    save(next);
    setWeightInput("");
  };

  const setStart = () => {
    const lbs = parseFloat(startInput);
    if (!lbs || lbs <= 0) return;
    save({ ...state, startWeight: lbs });
    setStartInput("");
  };

  const setLift = (id, val) => {
    const v = parseFloat(val);
    if (isNaN(v)) return;
    save({ ...state, liftWeights: { ...state.liftWeights, [id]: v } });
  };

  const askNotifPermission = async () => {
    if (typeof Notification === "undefined") {
      alert("Notifications not supported here — the timeline still updates live.");
      return;
    }
    const p = await Notification.requestPermission();
    save({ ...state, notifOn: p === "granted" });
  };

  const status = (e) => {
    if (state.checks[e.id]) return "done";
    if (nowMin >= e.time) {
      const firstLive = events.find((x) => nowMin >= x.time && !state.checks[x.id]);
      return firstLive && firstLive.id === e.id ? "active" : "overdue";
    }
    return "future";
  };
  const nextUp = events.find((e) => nowMin < e.time);
  const dayN = state.startDate ? Math.floor((Date.now() - new Date(state.startDate).getTime()) / 864e5) + 1 : null;
  const weekN = dayN ? Math.floor((dayN - 1) / 7) + 1 : null;
  const calsToday = events.reduce((a, e) => a + (state.checks[e.id] === true ? (CALS[e.id] || 0) : 0), 0);
  const startPlan = () => save({ ...state, startDate: new Date().toISOString().slice(0, 10), startLifts: { ...state.liftWeights } });
  let milestone = null;
  if (dayN && [7, 14, 30, 60, 90].includes(dayN)) milestone = `🔥 Day ${dayN}. Most people quit by now. Not you.`;
  const gainNum = latest != null && state.startWeight != null ? latest - state.startWeight : 0;
  if (!milestone && gainNum >= 5) milestone = `💪 +${Math.floor(gainNum / 5) * 5} lbs gained since Day 1`;
  const liveCount = events.filter((e) => state.checks[e.id]).length;

  // ---- auto-coach: flat over last 14 days? ----
  const twoWeeksAgo = Date.now() - 14 * 864e5;
  const recent = state.weights.filter((p) => p.t >= twoWeeksAgo);
  const coachFlat =
    state.weights.length >= 3 &&
    recent.length >= 2 &&
    recent[recent.length - 1].lbs - recent[0].lbs < 1;

  const rangeMs = { "1W": 7 * 864e5, "1M": 30 * 864e5, "3M": 90 * 864e5, ALL: Infinity }[range];
  const cutoff = Date.now() - rangeMs;
  const pts = state.weights.filter((p) => p.t >= cutoff);
  const latest = state.weights.length ? state.weights[state.weights.length - 1].lbs : null;
  const delta = latest != null && state.startWeight != null ? (latest - state.startWeight).toFixed(1) : null;
  const daysIn = state.weights.length ? Math.max(1, Math.round((Date.now() - state.weights[0].t) / 864e5)) : 0;

  const Chart = () => {
    if (pts.length < 2)
      return <p style={{ fontSize: 13, color: "#777", margin: 0 }}>Log at least 2 weigh-ins to see the graph.</p>;
    const vals = pts.map((p) => p.lbs);
    const min = Math.min(...vals, state.startWeight ?? Infinity) - 2;
    const max = Math.max(...vals) + 2;
    const t0 = pts[0].t,
      t1 = pts[pts.length - 1].t || t0 + 1;
    const W = 340, H = 150, P = 14;
    const X = (t) => P + ((t - t0) / (t1 - t0 || 1)) * (W - 2 * P);
    const Y = (v) => H - P - ((v - min) / (max - min)) * (H - 2 * P);
    const line = pts.map((p) => `${X(p.t)},${Y(p.lbs)}`).join(" ");
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block" }}>
        {state.startWeight != null && (
          <line x1={P} x2={W - P} y1={Y(state.startWeight)} y2={Y(state.startWeight)} stroke="#BBB" strokeDasharray="5 4" strokeWidth="1.5" />
        )}
        <polyline points={line} fill="none" stroke="#2743F0" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
        {pts.map((p, i) => (
          <circle key={i} cx={X(p.t)} cy={Y(p.lbs)} r="4.5" fill="#0E0E10" />
        ))}
      </svg>
    );
  };

  const C = { ink: "#0E0E10", paper: "#F5F4EF", blue: "#2743F0", gray: "#6E6E72", line: "#E4E2DA", warn: "#C6470E" };
  const S = {
    app: { fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif", background: C.paper, color: C.ink, minHeight: "100dvh", maxWidth: 480, margin: "0 auto", paddingTop: TOP_PAD, paddingBottom: "calc(150px + env(safe-area-inset-bottom))", boxSizing: "border-box" },
    h1: { fontSize: 34, fontWeight: 900, letterSpacing: "-0.03em", textTransform: "uppercase", margin: "0 0 2px" },
    header: { padding: "22px 18px 6px" },
    tabbar: { position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto", display: "flex", background: C.ink, borderRadius: "16px 16px 0 0", zIndex: 10, paddingBottom: "env(safe-area-inset-bottom)" },
    tabBtn: (a) => ({ flex: 1, padding: "15px 0", background: "none", border: "none", color: a ? C.paper : "#6E6E72", fontWeight: 800, fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer", borderTop: a ? `3px solid ${C.blue}` : "3px solid transparent" }),
    btn: { padding: "12px 18px", background: C.blue, color: "#fff", border: `2px solid ${C.ink}`, borderRadius: 10, fontWeight: 800, fontSize: 15, cursor: "pointer" },
    input: { flex: 1, padding: "12px 14px", fontSize: 16, border: `2px solid ${C.ink}`, borderRadius: 10, background: "#fff", minWidth: 0 },
    card: { background: "#fff", border: `2px solid ${C.ink}`, borderRadius: 14, margin: "12px 14px", padding: 16, boxShadow: `4px 4px 0 ${C.ink}` },
    label: { fontSize: 11, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: C.blue, margin: "0 0 8px" },
  };

  const EventCard = ({ e }) => {
    const st = status(e);
    if (st === "future") return null;
    const done = st === "done";
    const active = st === "active";
    const base = { margin: "10px 14px", borderRadius: 14, border: `2px solid ${C.ink}`, background: "#fff", transition: "all 0.4s ease", overflow: "hidden" };
    if (done) {
      const skipped = state.checks[e.id] === "skip";
      return (
        <div style={{ ...base, opacity: 0.35, transform: "scale(0.94)", padding: "10px 14px", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontWeight: 900, color: skipped ? C.gray : C.blue }}>{skipped ? "✕" : "✓"}</span>
          <span style={{ fontSize: 14, fontWeight: 700, textDecoration: "line-through" }}>{fmt(e.time)} — {e.title}{skipped ? " (skipped)" : ""}</span>
        </div>
      );
    }
    return (
      <div style={{ ...base, padding: 16, boxShadow: active ? `5px 5px 0 ${C.blue}` : `4px 4px 0 ${C.ink}`, opacity: active ? 1 : 0.75 }}>
        <span style={{ fontFamily: "'Courier New', monospace", fontWeight: 700, fontSize: 13, color: active ? C.blue : C.gray }}>
          {fmt(e.time)} {st === "overdue" ? "· catch up" : "· NOW"}
        </span>
        <h2 style={{ fontSize: 22, fontWeight: 900, margin: "4px 0 2px", letterSpacing: "-0.02em" }}>{e.title}</h2>
        <p style={{ fontSize: 13, color: C.gray, margin: "0 0 10px", fontWeight: 600 }}>{e.sub}</p>
        <ol style={{ margin: 0, paddingLeft: 20 }}>
          {e.steps.map((s, i) => (
            <li key={i} style={{ fontSize: 15, lineHeight: 1.5, marginBottom: 4 }}>{s}</li>
          ))}
        </ol>
        {e.id === "weighin" && (
          <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
            <input style={S.input} type="number" inputMode="decimal" placeholder="lbs" value={weightInput} onChange={(ev) => setWeightInput(ev.target.value)} />
            <button style={S.btn} onClick={() => { logWeight(); toggleCheck(e.id); }}>Log ✓</button>
          </div>
        )}
        {e.id === "lift" && (
          <div style={{ marginTop: 14 }}>
            <button style={{ ...S.btn, width: "100%" }} onClick={() => completeLift(true)}>Hit all reps ✓</button>
            <button style={{ ...S.btn, width: "100%", marginTop: 8, background: "#fff", color: C.ink }} onClick={() => completeLift(false)}>Missed some reps</button>
          </div>
        )}
        {e.id !== "weighin" && e.id !== "lift" && <button style={{ ...S.btn, width: "100%", marginTop: 14 }} onClick={() => toggleCheck(e.id)}>Done ✓</button>}
        <button style={{ width: "100%", marginTop: 6, padding: "10px", background: "none", border: "none", color: C.gray, fontWeight: 700, fontSize: 13, cursor: "pointer" }} onClick={() => skipEvent(e.id)}>Skip today</button>
      </div>
    );
  };

  if (!loaded) return <div style={{ ...S.app, padding: 40, textAlign: "center", fontWeight: 700 }}>Loading…</div>;

  return (
    <div style={S.app}>
      {tab === "home" && (
        <>
          <div style={S.header}>
            {dayN && (
              <div style={{ fontSize: 15, fontWeight: 900, letterSpacing: "0.1em", color: C.blue, textTransform: "uppercase", marginBottom: 2 }}>
                Day {dayN} · Week {weekN}
              </div>
            )}
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.14em", color: C.gray, textTransform: "uppercase" }}>
              {DAYS[day]} · {fmt(nowMin)} · {liveCount}/{events.length} done{state.streak > 0 ? ` · 🔥 ${state.streak} day streak` : ""}
            </div>
            <h1 style={S.h1}>{isLiftDay ? `Lift Day ${state.nextWorkout}` : "Rest & Eat"}</h1>
            <div style={{ height: 8, borderRadius: 4, background: "#E4E2DA", marginTop: 10, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(liveCount / events.length) * 100}%`, background: C.blue, transition: "width 0.5s ease" }} />
            </div>
            {calsToday > 0 && (
              <div style={{ fontSize: 13, fontWeight: 800, color: C.ink, marginTop: 6 }}>⚡ {calsToday.toLocaleString()} cal banked today</div>
            )}
          </div>

          {toast && (
            <div style={{ position: "fixed", top: "calc(env(safe-area-inset-top) + 12px)", left: "50%", transform: "translateX(-50%)", background: C.ink, color: "#fff", padding: "12px 20px", borderRadius: 12, fontWeight: 800, fontSize: 15, zIndex: 99, boxShadow: "0 4px 14px rgba(0,0,0,0.3)", whiteSpace: "nowrap" }}>
              {toast}
            </div>
          )}

          {!state.startDate && (
            <div style={{ ...S.card, textAlign: "center" }}>
              <p style={{ fontSize: 15, fontWeight: 700, margin: "0 0 12px" }}>Ready to begin?</p>
              <button style={{ ...S.btn, width: "100%", fontSize: 17 }} onClick={startPlan}>🚀 Start Day 1</button>
            </div>
          )}

          {coachFlat && (
            <div style={{ margin: "10px 14px", padding: "12px 16px", borderRadius: 12, border: `2px solid ${C.warn}`, background: "#FDF1EA", fontSize: 14, fontWeight: 700, color: C.warn }}>
              Coach: scale's been flat 2 weeks. Starting today — add 1 tbsp olive oil + a 2nd banana to each shake, and don't skip the bedtime snack.
            </div>
          )}

          {lowItems.length > 0 && (
            <div style={{ margin: "10px 14px", padding: "12px 16px", borderRadius: 12, border: `2px solid ${C.warn}`, background: "#FDF1EA", fontSize: 14, fontWeight: 700, color: C.warn }} onClick={() => setTab("fridge")}>
              🛒 Running low: {lowItems.map((i) => i.name).join(", ")} — tap to restock
            </div>
          )}

          {milestone && (
            <div style={{ margin: "10px 14px", padding: "14px 16px", borderRadius: 12, border: `2px solid ${C.blue}`, background: "#EEF1FE", fontSize: 15, fontWeight: 800, color: C.blue, textAlign: "center" }}>
              {milestone}
            </div>
          )}

          {events.map((e) => (
            <EventCard key={e.id} e={e} />
          ))}

          {nextUp && (
            <div style={{ margin: "10px 14px", padding: "12px 16px", borderRadius: 12, border: `2px dashed ${C.gray}`, color: C.gray, fontSize: 14, fontWeight: 700 }}>
              Up next · {fmt(nextUp.time)} — {nextUp.title} (in {Math.floor((nextUp.time - nowMin) / 60)}h {(nextUp.time - nowMin) % 60}m)
            </div>
          )}
          {!nextUp && liveCount === events.length && (
            <div style={{ ...S.card, textAlign: "center", fontWeight: 900, fontSize: 18 }}>Day complete. 💪 Growth happens tonight.</div>
          )}
        </>
      )}

      {tab === "progress" && (
        <>
          <div style={S.header}><h1 style={S.h1}>Progress</h1></div>

          <div style={S.card}>
            {state.startWeight == null ? (
              <>
                <p style={S.label}>Set your starting weight</p>
                <div style={{ display: "flex", gap: 10 }}>
                  <input style={S.input} type="number" inputMode="decimal" placeholder="lbs" value={startInput} onChange={(ev) => setStartInput(ev.target.value)} />
                  <button style={S.btn} onClick={setStart}>Set</button>
                </div>
              </>
            ) : (
              <div style={{ display: "flex", justifyContent: "space-between", textAlign: "center" }}>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Start</div><div style={{ fontSize: 24, fontWeight: 900 }}>{state.startWeight}</div></div>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Now</div><div style={{ fontSize: 24, fontWeight: 900 }}>{latest ?? "—"}</div></div>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Gained</div><div style={{ fontSize: 24, fontWeight: 900, color: C.blue }}>{delta != null ? (delta > 0 ? "+" : "") + delta : "—"}</div></div>
                <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Days</div><div style={{ fontSize: 24, fontWeight: 900 }}>{daysIn}</div></div>
              </div>
            )}
          </div>

          <div style={S.card}>
            <p style={S.label}>Log today's weight</p>
            <div style={{ display: "flex", gap: 10 }}>
              <input style={S.input} type="number" inputMode="decimal" placeholder="lbs" value={weightInput} onChange={(ev) => setWeightInput(ev.target.value)} />
              <button style={S.btn} onClick={logWeight}>Log</button>
            </div>
          </div>

          <div style={S.card}>
            <p style={S.label}>All-time</p>
            <div style={{ display: "flex", justifyContent: "space-between", textAlign: "center" }}>
              <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Cal banked</div><div style={{ fontSize: 22, fontWeight: 900, color: C.blue }}>{(state.totals?.cal || 0).toLocaleString()}</div></div>
              <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Shakes</div><div style={{ fontSize: 22, fontWeight: 900 }}>{state.totals?.shakes || 0}</div></div>
              <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Workouts</div><div style={{ fontSize: 22, fontWeight: 900 }}>{state.totals?.workouts || 0}</div></div>
              <div><div style={{ fontSize: 11, fontWeight: 800, color: C.gray, textTransform: "uppercase" }}>Streak</div><div style={{ fontSize: 22, fontWeight: 900 }}>🔥{state.streak || 0}</div></div>
            </div>
          </div>

          <div style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <p style={{ ...S.label, margin: 0 }}>Growth chart</p>
              <div style={{ display: "flex", gap: 4 }}>
                {["1W", "1M", "3M", "ALL"].map((r) => (
                  <button key={r} onClick={() => setRange(r)} style={{ padding: "5px 9px", fontSize: 11, fontWeight: 800, borderRadius: 8, border: `2px solid ${C.ink}`, background: range === r ? C.blue : "#fff", color: range === r ? "#fff" : C.ink, cursor: "pointer" }}>{r}</button>
                ))}
              </div>
            </div>
            <Chart />
            <p style={{ fontSize: 12, color: C.gray, margin: "8px 0 0" }}>Target: +0.5–1 lb/week.</p>
          </div>

          <div style={S.card}>
            <p style={S.label}>Current lift numbers</p>
            {Object.entries({ ...LIFTS.A.reduce((a, l) => ({ ...a, [l.id]: l }), {}), ...LIFTS.B.reduce((a, l) => ({ ...a, [l.id]: l }), {}) })
              .filter(([id]) => !["plank", "pullup"].includes(id))
              .map(([id, l]) => (
                <div key={id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.line}` }}>
                  <span style={{ fontWeight: 600, fontSize: 15 }}>{l.name}{state.startLifts && state.liftWeights[id] > state.startLifts[id] ? <span style={{ color: C.blue, fontWeight: 900, fontSize: 13 }}> +{state.liftWeights[id] - state.startLifts[id]}</span> : null}</span>
                  <input
                    type="number"
                    inputMode="decimal"
                    key={id}
                    defaultValue={state.liftWeights[id]}
                    onBlur={(ev) => setLift(id, ev.target.value)}
                    style={{ width: 70, padding: "6px 8px", fontSize: 15, fontWeight: 700, border: `2px solid ${C.ink}`, borderRadius: 8, textAlign: "right" }}
                  />
                </div>
              ))}
                      </div>
        </>
      )}

      {tab === "lifts" && (
        <>
          <div style={S.header}><h1 style={S.h1}>Lifts</h1></div>
          <div style={{ display: "flex", gap: 8, margin: "0 14px 4px" }}>
            {["A", "B"].map((w) => (
              <button key={w} onClick={() => { setLiftTab(w); setOpenLift(null); }} style={{ flex: 1, padding: "12px", fontWeight: 900, fontSize: 15, borderRadius: 10, border: `2px solid ${C.ink}`, background: liftTab === w ? C.blue : "#fff", color: liftTab === w ? "#fff" : C.ink, cursor: "pointer" }}>
                Workout {w}
              </button>
            ))}
          </div>
          {LIFTS[liftTab].map((l) => {
            const open = openLift === l.id;
            const w = state.liftWeights[l.id];
            const showW = !["plank", "pullup"].includes(l.id);
            return (
              <div key={l.id} style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                <div onClick={() => setOpenLift(open ? null : l.id)} style={{ padding: 16, display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 16 }}>{l.name}</div>
                    <div style={{ fontSize: 13, color: C.gray, fontWeight: 600 }}>{l.scheme}{showW ? ` @ ${w} lbs` : ""}</div>
                  </div>
                  <span style={{ fontWeight: 900, fontSize: 18, color: C.blue }}>{open ? "▲" : "▶"}</span>
                </div>
                {open && videoSrc(l.id) && (
                  <div style={{ borderTop: `2px solid ${C.ink}` }}>
                    <iframe
                      src={videoSrc(l.id)}
                      style={{ width: "100%", aspectRatio: "16/9", border: "none", display: "block" }}
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowFullScreen
                      title={l.name}
                    />
                  </div>
                )}
                {open && !videoSrc(l.id) && (
                  <div style={{ borderTop: `2px solid ${C.ink}`, padding: 14 }}>
                    <a href={videoLink(l.id)} target="_blank" rel="noopener" style={{ ...S.btn, display: "block", textAlign: "center", textDecoration: "none" }}>▶️ Watch form video on YouTube</a>
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}

      {tab === "fridge" && (
        <>
          <div style={S.header}><h1 style={S.h1}>Fridge</h1></div>
          {PANTRY.map((item) => {
            const left = state.pantry?.[item.id] ?? item.pkg;
            const days = item.perDay > 0 ? left / item.perDay : 99;
            const frac = Math.min(1, left / item.pkg);
            const low = days <= 3;
            const buyUrl = item.buy === "maps" ? MAPS_URL : item.buy;
            return (
              <div key={item.id} style={{ ...S.card, borderColor: low ? C.warn : C.ink }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                  <span style={{ fontWeight: 800, fontSize: 16 }}>{item.name}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: low ? C.warn : C.gray }}>
                    {low ? "⚠️ " : ""}{Math.max(0, Math.round(days))} days left
                  </span>
                </div>
                <div style={{ height: 8, borderRadius: 4, background: "#E4E2DA", margin: "10px 0", overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${frac * 100}%`, background: low ? C.warn : C.blue, transition: "width 0.4s" }} />
                </div>
                <div style={{ fontSize: 13, color: C.gray, marginBottom: 4 }}>
                  ~{Math.round(left * 10) / 10} {item.unit} left
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>
                  Buy: {item.brand} · ~${item.price}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button style={{ ...S.btn, flex: 1, padding: "10px" }} onClick={() => restock(item.id)}>Bought one ✓</button>
                  <a href={buyUrl} target="_blank" rel="noopener" style={{ ...S.btn, flex: 1, padding: "10px", background: "#fff", color: C.ink, textAlign: "center", textDecoration: "none" }}>🛒 Amazon</a>
                </div>
              </div>
            );
          })}
          <div style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 15, fontWeight: 700, marginBottom: 6 }}>
              <span>Restock low items now</span>
              <span style={{ color: C.warn }}>~${lowItems.reduce((a, i) => a + i.price, 0)}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 15, fontWeight: 700 }}>
              <span>Full restock (everything)</span>
              <span style={{ color: C.blue }}>~${PANTRY.reduce((a, i) => a + i.price, 0)}</span>
            </div>
            <div style={{ fontSize: 12, color: C.gray, marginTop: 8 }}>
              Ballpark prices — creatine and whey are the big ones but last months.
            </div>
          </div>
        </>
      )}

      {tab === "settings" && (
        <>
          <div style={S.header}><h1 style={S.h1}>Settings</h1></div>

          <div style={S.card}>
            <p style={S.label}>Gym heads-up time</p>
            <p style={{ fontSize: 14, margin: "0 0 8px" }}>
              Alert me <b>{state.offsetMin < 60 ? `${state.offsetMin} min` : `${(state.offsetMin / 60).toFixed(1)} hr`}</b> before my 6pm workout
            </p>
            <input type="range" min="0" max="300" step="5" value={state.offsetMin} onChange={(ev) => save({ ...state, offsetMin: parseInt(ev.target.value) })} style={{ width: "100%" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.gray, fontWeight: 700 }}><span>0 min</span><span>5 hrs</span></div>
          </div>

          <div style={S.card}>
            <p style={S.label}>Notifications</p>
            <p style={{ fontSize: 13, color: C.gray, margin: "0 0 10px" }}>
              In-app alerts while the app is open. Lock-screen alerts come from your iPhone Reminders.
            </p>
            <button style={S.btn} onClick={askNotifPermission}>{state.notifOn ? "Notifications ON ✓" : "Turn on notifications"}</button>
          </div>

          <div style={S.card}>
            <p style={S.label}>Starting weight</p>
            <div style={{ display: "flex", gap: 10 }}>
              <input style={S.input} type="number" inputMode="decimal" placeholder={state.startWeight ? `${state.startWeight} lbs` : "lbs"} value={startInput} onChange={(ev) => setStartInput(ev.target.value)} />
              <button style={S.btn} onClick={setStart}>Save</button>
            </div>
          </div>

          <div style={S.card}>
            <p style={S.label}>Next workout</p>
            <p style={{ fontSize: 14, margin: "0 0 10px" }}>Next up: Workout <b>{state.nextWorkout}</b>.</p>
            <button style={{ ...S.btn, background: "#fff", color: C.ink }} onClick={() => save({ ...state, nextWorkout: state.nextWorkout === "A" ? "B" : "A" })}>
              Switch to {state.nextWorkout === "A" ? "B" : "A"}
            </button>
          </div>
        </>
      )}

      <nav style={S.tabbar}>
        <button style={S.tabBtn(tab === "home")} onClick={() => setTab("home")}>Today</button>
        <button style={S.tabBtn(tab === "lifts")} onClick={() => setTab("lifts")}>Lifts</button>
        <button style={S.tabBtn(tab === "fridge")} onClick={() => setTab("fridge")}>Fridge</button>
        <button style={S.tabBtn(tab === "progress")} onClick={() => setTab("progress")}>Stats</button>
        <button style={S.tabBtn(tab === "settings")} onClick={() => setTab("settings")}>More</button>
      </nav>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<GainCoach />);
</script>
</body>
</html>
